name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: '20.18.0'
          cache: pnpm
          registry-url: 'https://registry.npmjs.org'
      - run: pnpm install --frozen-lockfile
      - run: pnpm lint
      - run: pnpm typecheck
      - run: pnpm test
      - run: pnpm --filter @hypedexer/sdk build
      - name: Verify tag matches package version and pick dist-tag
        id: release
        run: |
          PKG_VERSION=$(node -p "require('./packages/sdk/package.json').version")
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          if [ "$PKG_VERSION" != "$TAG_VERSION" ]; then
            echo "Tag $TAG_VERSION does not match package version $PKG_VERSION" >&2
            exit 1
          fi
          case "$PKG_VERSION" in
            *-*) echo "dist_tag=beta" >> "$GITHUB_OUTPUT" ;;
            *)   echo "dist_tag=latest" >> "$GITHUB_OUTPUT" ;;
          esac
      - name: Publish to npm
        run: pnpm --filter @hypedexer/sdk publish --no-git-checks --access public --tag ${{ steps.release.outputs.dist_tag }}
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
          NPM_CONFIG_PROVENANCE: 'true'
